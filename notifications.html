<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - LuxeBags</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="nav-brand">LUXEBAGS</a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="orders.html" id="orders-link" class="nav-link" style="display: none;">My Orders</a>
                    <a href="notifications.html" class="nav-link active">Notifications</a>
                    <a href="account.html" class="nav-link">My Account</a>
                </div>
                <div class="nav-actions flex-center gap-3">
                    <button class="btn btn-ghost" id="cart-btn" title="Shopping Cart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span id="cart-count" class="badge" style="margin-left: -4px;">0</span>
                    </button>
                    <a href="login.html" class="btn btn-primary btn-medium" id="login-btn">Login</a>
                    <button class="btn btn-secondary btn-medium" id="logout-btn" style="display: none;">Log Out</button>
                </div>
            </nav>
        </div>
    </header>

    <style>
        .notification-list {
            background: var(--pure-white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .notification-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            transition: background 0.15s ease;
            position: relative;
        }

        .notification-row:last-child {
            border-bottom: none;
        }

        .notification-row:hover {
            background: var(--surface-light);
        }

        .notification-row.unread {
            background: rgba(0, 0, 0, 0.02);
        }

        .notification-row.unread::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
        }

        .notification-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--surface-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .notification-icon.order {
            background: #e8f5e9;
        }

        .notification-icon.broadcast {
            background: #e3f2fd;
        }

        .notification-icon.admin_message {
            background: #fce4ec;
        }

        .notification-body {
            flex: 1;
            min-width: 0;
        }

        .notification-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notification-preview {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notification-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .notification-time {
            font-size: 12px;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .notification-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-top: 6px;
        }

        .notification-expanded {
            padding: 12px 20px 16px 80px;
            background: var(--surface-light);
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 20px;
            display: none;
        }

        .notification-expanded.open {
            display: block;
        }

        .notification-empty {
            padding: 48px 20px;
            text-align: center;
            color: var(--text-tertiary);
        }
    </style>

    <main style="padding-top: 56px; min-height: 70vh;">
        <section class="container">
            <div class="flex-between mb-4" style="flex-wrap: wrap; gap: 16px;">
                <h1 class="h1" style="font-size: 24px; font-weight: 600;">Notifications</h1>
                <button class="btn btn-secondary btn-medium" id="mark-all-read">Mark All as Read</button>
            </div>

            <div class="notification-list" id="notifications-list">
                <div class="skeleton product-card" style="height: 200px; border-radius: 0;"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px;">
                <div>
                    <h4>LUXEBAGS</h4>
                    <p class="body-text" style="color: var(--text-tertiary);">Premium handbags and designer heels for the modern woman.</p>
                </div>
                <div>
                    <h4>Quick Links</h4>
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="account.html">My Account</a>
                </div>
                <div>
                    <h4>Customer Service</h4>
                    <a href="#">Contact Us</a>
                    <a href="#">Shipping Policy</a>
                    <a href="#">Returns</a>
                </div>
            </div>
            <hr>
            <p class="text-center caption">&copy; 2024 LuxeBags. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { initAuth, waitForAuth, isAuthenticated, getUser, logout } from './js/auth.js';
        import { initCart, getCart } from './js/cart.js';
        import { subscribeToUserNotifications, markNotificationRead, markAllNotificationsRead } from './js/orders.js';
        import { db, collection, query, where, orderBy, getDocs, limit } from './js/firebase.js';
        import { formatDate, showToast } from './js/utils.js';

        let notificationsUnsub = null;

        const initPage = async () => {
            await initAuth(async (user) => {
                if (user) {
                    document.getElementById('login-btn').style.display = 'none';
                    document.getElementById('logout-btn').style.display = 'inline-flex';
                    document.getElementById('orders-link').style.display = 'block';
                    initCart();
                    renderCartSidebar();
                } else {
                    document.getElementById('login-btn').style.display = 'inline-flex';
                    document.getElementById('logout-btn').style.display = 'none';
                }
            });

            await waitForAuth();

            if (!isAuthenticated()) {
                window.location.href = 'login.html?redirect=notifications.html';
                return;
            }

            document.getElementById('logout-btn').addEventListener('click', async () => {
                await logout();
                window.location.href = 'index.html';
            });

            document.getElementById('mark-all-read').addEventListener('click', async () => {
                const user = getUser();
                if (user) {
                    await markAllNotificationsRead(user.uid);
                    showToast('All notifications marked as read', 'success');
                }
            });

            await loadNotifications();

            window.addEventListener('beforeunload', () => {
                if (notificationsUnsub) notificationsUnsub();
            });
        };

        const loadNotifications = async () => {
            const user = getUser();
            if (!user) return;

            if (notificationsUnsub) notificationsUnsub();

            try {
                const [personalSnap, broadcastSnap] = await Promise.all([
                    getDocs(query(collection(db, "notifications"), where("userId", "==", user.uid), orderBy("createdAt", "desc"), limit(50))),
                    getDocs(query(collection(db, "notifications"), where("userId", "==", "all"), orderBy("createdAt", "desc"), limit(50)))
                ]);
                const personal = personalSnap.docs.map(doc => ({ id: doc.id, ...doc.data({ serverTimestamps: 'estimate' }) }));
                const broadcasts = broadcastSnap.docs.map(doc => ({ id: doc.id, ...doc.data({ serverTimestamps: 'estimate' }) }));
                const merged = [...personal, ...broadcasts];
                merged.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderNotifications(merged);
            } catch (error) {
                console.error('Failed to load initial notifications:', error);
                showToast('Failed to load notifications. Check Firestore rules and indexes.', 'error');
            }

            notificationsUnsub = await subscribeToUserNotifications(user.uid, (notifications) => {
                renderNotifications(notifications);
            });
        };

        const renderNotifications = (notifications) => {
            const container = document.getElementById('notifications-list');

            if (notifications.length === 0) {
                container.innerHTML = '<div class="notification-empty">No notifications yet</div>';
                return;
            }

            container.innerHTML = notifications.map(notif => {
                const preview = notif.message.length > 80 ? notif.message.slice(0, 80) + '...' : notif.message;
                const icon = getNotificationIcon(notif.type);
                const time = formatNotificationDate(notif.createdAt);
                return `
                    <div class="notification-row ${notif.read ? 'read' : 'unread'}" data-id="${notif.id}">
                        <div class="notification-icon ${notif.type}">${icon}</div>
                        <div class="notification-body">
                            <div class="notification-title">${escapeHtml(notif.title)}</div>
                            <div class="notification-preview">${escapeHtml(preview)}</div>
                        </div>
                        <div class="notification-meta">
                            <div class="notification-time">${time}</div>
                            ${!notif.read ? '<div class="notification-dot"></div>' : ''}
                        </div>
                    </div>
                    <div class="notification-expanded" id="expanded-${notif.id}">
                        ${escapeHtml(notif.message)}
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.notification-row').forEach(row => {
                row.addEventListener('click', async () => {
                    const notifId = row.dataset.id;
                    const expanded = document.getElementById(`expanded-${notifId}`);
                    const isOpen = expanded.classList.contains('open');
                    const wasUnread = row.classList.contains('unread');

                    document.querySelectorAll('.notification-expanded.open').forEach(el => el.classList.remove('open'));
                    document.querySelectorAll('.notification-row.unread').forEach(el => el.classList.remove('unread'));
                    document.querySelectorAll('.notification-dot').forEach(el => el.remove());

                    if (!isOpen) {
                        expanded.classList.add('open');
                        row.classList.add('read');
                        if (wasUnread) {
                            try {
                                await markNotificationRead(notifId);
                            } catch (err) {
                                console.error('Failed to mark notification as read:', err);
                            }
                        }
                    }
                });
            });
        };

        const getNotificationIcon = (type) => {
            switch (type) {
                case 'order': return '📦';
                case 'broadcast': return '📢';
                case 'admin_message': return '💬';
                default: return '🔔';
            }
        };

        const formatNotificationDate = (value) => {
            if (!value) return '';
            let date;
            if (value && typeof value.seconds === 'number') {
                date = new Date(value.seconds * 1000);
            } else if (value && typeof value.toDate === 'function') {
                date = value.toDate();
            } else {
                date = new Date(value);
            }
            if (isNaN(date.getTime())) return '';
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };

        const escapeHtml = (str) => {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        };

        const renderCartSidebar = () => {
            // Placeholder - cart is initialized elsewhere
        };

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
    <script src="js/whatsapp.js"></script>
</body>
</html>
