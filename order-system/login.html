<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MyStore</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">MyStore</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <main class="container" style="padding-top: 120px; padding-bottom: 120px; min-height: 100vh;">
    <div class="card" style="max-width: 400px; margin: 0 auto; padding: 40px;">
      <h2 class="text-center mb-3 h2">Welcome Back</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="label">Email</label>
          <input type="email" id="email" class="input" required>
        </div>
        <div class="form-group">
          <label for="password" class="label">Password</label>
          <input type="password" id="password" class="input" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" style="width:100%;">Login</button>
      </form>
      <p class="text-center mt-20">
        <a href="#" id="forgotPassword" style="color: var(--primary);">Forgot password?</a>
      </p>
      <p class="text-center mt-10">
        Don't have an account? <a href="#" style="color: var(--primary);">Sign up</a>
      </p>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="spinner"></div>
  </div>

  <script type="module" src="login.js"></script>
    <script src="../js/whatsapp.js"></script>
</body>
</html>
