<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LuxeBags</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main style="padding: 120px 0; min-height: 100vh; background-color: var(--pure-black);">
        <div class="container" style="max-width: 400px; margin: 0 auto;">
            <div class="card" style="padding: 40px; background-color: #1e293b; color: #f4f4f5; border-color: #334155;">
                <h2 class="text-center mb-3 h2" style="font-size: 20px; font-weight: 600; color: var(--primary);">Admin Dashboard</h2>
                <p class="text-center mb-4 body-text" style="color: #94a3b8;">Sign in to access admin panel</p>

                <form id="admin-login-form">
                    <div class="mb-3">
                        <label for="admin-email" class="label">Admin Email</label>
                        <input type="email" id="admin-email" class="input" placeholder="admin@luxebags.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="admin-password" class="label">Password</label>
                        <input type="password" id="admin-password" class="input" required>
                    </div>

                    <div id="error-message" class="text-danger" style="display: none; font-size: 14px; margin-bottom: 12px;"></div>

                    <button type="submit" class="btn btn-primary w-100" id="admin-login-btn">Login to Dashboard</button>
                </form>

                <p class="text-center mt-4 body-text"><a href="../index.html" style="color: #94a3b8;">Back to Store</a></p>
            </div>
        </div>
    </main>

    <script type="module">
        import { login, waitForAuth, isAuthenticated, isAdmin } from '../js/auth.js';
        import { showToast } from '../js/utils.js';

        document.addEventListener('DOMContentLoaded', async () => {
            // Wait for Firebase auth state before checking redirect
            await waitForAuth();
            if (isAuthenticated() && isAdmin()) {
                window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;

            document.getElementById('admin-login-btn').disabled = true;
            document.getElementById('admin-login-btn').textContent = 'Logging in...';

            const result = await login(email, password);

            if (result.success && isAdmin()) {
                showToast('Welcome to Admin Dashboard!', 'success');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-message').textContent = result.error || 'Access denied';
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('admin-login-btn').disabled = false;
                document.getElementById('admin-login-btn').textContent = 'Login to Dashboard';
            }
        });
    </script>
    <script src="../js/whatsapp.js"></script>
</body>
</html>
