<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Admin | LuxeBags</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-sidebar">
            <a href="../index.html" class="nav-brand">LUXEBAGS</a>
            <nav class="admin-sidebar-links">
                <a href="dashboard.html" class="admin-sidebar-link">Dashboard</a>
                <a href="products.html" class="admin-sidebar-link">Products</a>
                <a href="orders.html" class="admin-sidebar-link">Orders</a>
                <a href="customers.html" class="admin-sidebar-link">Customers</a>
                <a href="notifications.html" class="admin-sidebar-link active" title="Notifications">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span>Notifications</span>
                </a>
                <a href="#" id="admin-logout">Logout</a>
            </nav>
        </div>

        <div class="admin-main">
            <h1 class="h1" style="font-size: 20px; font-weight: 600; margin-bottom: 24px;">Notifications</h1>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start;">
                <div class="card" style="padding: 24px;">
                    <h3 class="h3" style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Send Broadcast</h3>
                    <form id="broadcast-form">
                        <div class="mb-3">
                            <label for="broadcast-title" class="label">Title</label>
                            <input type="text" id="broadcast-title" class="input" required>
                        </div>
                        <div class="mb-3">
                            <label for="broadcast-message" class="label">Message</label>
                            <textarea id="broadcast-message" class="textarea" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="broadcast-type" class="label">Type</label>
                            <select id="broadcast-type" class="select">
                                <option value="broadcast">Broadcast</option>
                                <option value="admin_message">Admin Message</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send to All Users</button>
                    </form>
                </div>

                <div class="card" style="padding: 24px;">
                    <h3 class="h3" style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Send to Individual User</h3>
                    <form id="individual-form">
                        <div class="mb-3">
                            <label for="user-select" class="label">Select User</label>
                            <select id="user-select" class="select" required>
                                <option value="">Loading users...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="individual-title" class="label">Title</label>
                            <input type="text" id="individual-title" class="input" required>
                        </div>
                        <div class="mb-3">
                            <label for="individual-message" class="label">Message</label>
                            <textarea id="individual-message" class="textarea" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="individual-type" class="label">Type</label>
                            <select id="individual-type" class="select">
                                <option value="admin_message">Admin Message</option>
                                <option value="order">Order Update</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send to User</button>
                    </form>
                </div>
            </div>

            <div class="chart-container" style="margin-top: 24px;">
                <h3 class="h3" style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Notification History</h3>
                <div style="overflow-x: auto;">
                    <table class="table" id="notifications-table">
                        <thead>
                        <tr>
                            <th>User</th>
                            <th>Title</th>
                            <th>Message</th>
                            <th>Type</th>
                            <th>Date</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" class="text-center">Loading notifications...</td></tr>
                    </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initAuth, waitForAuth, isAuthenticated, isAdmin, logout } from '../js/auth.js';
        import { loadAllUsers, createNotification, deleteNotification } from '../js/orders.js';
        import { db, collection, query, where, orderBy, onSnapshot, getDocs, limit } from '../js/firebase.js';
        import { formatDate, showToast } from '../js/utils.js';

        const escapeHtml = (str) => {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        };

        let notificationsUnsub = null;
        let usersMap = new Map();

        const initPage = async () => {
            initAuth();
            await waitForAuth();

            if (!isAuthenticated() || !isAdmin()) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('admin-logout').addEventListener('click', async (e) => {
                e.preventDefault();
                await logout();
                showToast('Logged out successfully', 'success');
                window.location.href = 'login.html';
            });

            await loadUsers();
            await setupRealtimeNotifications();

            document.getElementById('broadcast-form').addEventListener('submit', handleBroadcast);
            document.getElementById('individual-form').addEventListener('submit', handleIndividual);

            window.addEventListener('beforeunload', () => {
                if (notificationsUnsub) notificationsUnsub();
            });
        };

        const loadUsers = async () => {
            const result = await loadAllUsers();
            if (result.success) {
                usersMap = new Map(result.users.map(u => [u.id, u]));
                const select = document.getElementById('user-select');
                select.innerHTML = result.users
                    .filter(u => u.role !== 'admin')
                    .map(u => `<option value="${escapeHtml(u.id)}">${escapeHtml(u.name || u.email)} (${escapeHtml(u.email)})</option>`)
                    .join('');
            }
        };

        const setupRealtimeNotifications = async () => {
            try {
                const initialSnap = await getDocs(query(
                    collection(db, "notifications"),
                    orderBy("createdAt", "desc"),
                    limit(100)
                ));
                const notifications = initialSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAdminNotificationsTable(notifications);
            } catch (error) {
                console.error('Failed to load initial notifications:', error);
                showToast('Failed to load notifications. Check Firestore rules and indexes.', 'error');
            }

            const q = query(
                collection(db, "notifications"),
                orderBy("createdAt", "desc")
            );

            notificationsUnsub = onSnapshot(q, (snapshot) => {
                const notifications = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAdminNotificationsTable(notifications);
            }, (error) => {
                console.error('Notifications listener error:', error);
                showToast('Real-time notifications failed. Please refresh.', 'error');
            });
        };

        const renderAdminNotificationsTable = (notifications) => {
            const tbody = document.querySelector('#notifications-table tbody');
            
            if (notifications.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No notifications found</td></tr>';
                return;
            }

            tbody.innerHTML = notifications.slice(0, 50).map(notif => {
                const user = usersMap.get(notif.userId);
                return `
                    <tr>
                        <td class="body-text">${escapeHtml(user?.name || user?.email || notif.userId)}</td>
                        <td class="body-text">${escapeHtml(notif.title)}</td>
                        <td class="body-text">${escapeHtml(notif.message)}</td>
                        <td class="body-text"><span class="badge">${escapeHtml(notif.type)}</span></td>
                        <td class="body-text">${formatDate(notif.createdAt)}</td>
                        <td class="body-text">
                            <button class="btn btn-danger btn-small" data-delete="${escapeHtml(notif.id)}">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');

            tbody.querySelectorAll('button[data-delete]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const notificationId = btn.dataset.delete;
                    if (await confirmAdminDelete()) {
                        await deleteAdminNotification(notificationId);
                    }
                });
            });
        };

        const confirmAdminDelete = async () => {
            const value = window.prompt('Type "Delete" to confirm you want to delete this notification.');
            if (value === null) return false;
            if (value.trim().toLowerCase() === 'delete') return true;
            showToast('Deletion cancelled. You must type "Delete" exactly.', 'error');
            return false;
        };

        const deleteAdminNotification = async (notificationId) => {
            try {
                await deleteNotification(notificationId);
                showToast('Notification deleted', 'success');
            } catch (error) {
                console.error('Failed to delete notification:', error);
                showToast(error.message || 'Failed to delete notification', 'error');
            }
        };

        const handleBroadcast = async (e) => {
            e.preventDefault();
            const title = document.getElementById('broadcast-title').value.trim();
            const message = document.getElementById('broadcast-message').value.trim();
            const type = document.getElementById('broadcast-type').value;

            if (!title || !message) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const usersResult = await loadAllUsers();
                if (usersResult.success) {
                    usersMap = new Map(usersResult.users.map(u => [u.id, u]));
                    const promises = usersResult.users
                        .filter(u => u.role !== 'admin')
                        .map(u => createNotification({
                            userId: u.id,
                            title,
                            message,
                            type,
                            relatedId: null
                        }));
                    await Promise.all(promises);
                    showToast('Broadcast sent to all users!', 'success');
                    e.target.reset();
                }
            } catch (error) {
                showToast(error.message || 'Failed to send broadcast', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send to All Users';
            }
        };

        const handleIndividual = async (e) => {
            e.preventDefault();
            const userId = document.getElementById('user-select').value;
            const title = document.getElementById('individual-title').value.trim();
            const message = document.getElementById('individual-message').value.trim();
            const type = document.getElementById('individual-type').value;

            if (!userId || !title || !message) {
                showToast('Please select a user and fill in all fields', 'error');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                await createNotification({
                    userId,
                    title,
                    message,
                    type,
                    relatedId: null
                });
                showToast('Message sent to user!', 'success');
                e.target.reset();
            } catch (error) {
                showToast(error.message || 'Failed to send message', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send to User';
            }
        };

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
