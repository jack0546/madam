<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-verification" content="googlee274869f9486d338">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://identitytoolkit.googleapis.com https://firestore.googleapis.com https://*.firebaseio.com https://*.googleapis.com https://*.gstatic.com;">
    <title>Login - LuxeBags</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ai.css">
    <link rel="stylesheet" href="css/nav-menu.css">
    <style>
        .google-btn {
            background-color: var(--pure-white);
            color: #4285f4;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .google-btn:hover {
            background-color: var(--surface-light);
            border-color: var(--border-subtle);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-tertiary);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="nav-brand">LUXEBAGS</a>
                <a href="index.html" class="btn btn-secondary btn-medium">Back to Home</a>
            </nav>
        </div>
    </header>

    <main style="padding: 120px 0; min-height: 100vh; background-color: var(--pure-white);">
        <div class="container" style="max-width: 400px; margin: 0 auto;">
            <div class="card" style="padding: 40px;">
                <h2 class="text-center mb-3 h2" style="font-size: 24px; font-weight: 600;">Welcome Back</h2>
                <p class="text-center mb-4 body-text" style="color: var(--text-secondary);">Sign in to your account</p>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="email" class="label">Email Address</label>
                        <input type="email" id="email" class="input" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="label">Password</label>
                        <input type="password" id="password" class="input" placeholder="Enter your password" required>
                    </div>

                    <div id="error-message" class="text-danger" style="display: none; font-size: 14px; margin-bottom: 12px;"></div>

                    <button type="submit" class="btn btn-primary w-100 mb-3" id="login-btn">
                        Sign In
                    </button>

                    <div class="text-center mb-3">
                        <a href="forgot-password.html" style="color: var(--primary); font-size: 14px;">Forgot Password?</a>
                    </div>
                </form>

                <div class="divider">
                    <span style="background: var(--pure-white); padding: 0 12px; font-size: 14px; color: var(--text-tertiary);">or</span>
                </div>

                <button class="btn google-btn w-100 mb-3" id="google-login-btn">
                    <svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
                        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
                    </svg>
                    Continue with Google
                </button>

                <div id="google-error-message" class="text-danger" style="display: none; font-size: 14px; margin-bottom: 12px; text-align: center;"></div>

                <hr style="border: none; border-top: 1px solid var(--border-light); margin: 24px 0;">

                <p class="text-center body-text">Don't have an account? <a href="register.html" style="color: var(--primary);">Sign Up</a></p>
            </div>
        </div>
    </main>

    <script type="module">
        import { login, loginGoogle } from './js/auth.js';

        function isValidRedirect(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const parsed = new URL(url, window.location.origin);
                return parsed.origin === window.location.origin;
            } catch {
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-message');
            const googleBtn = document.getElementById('google-login-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in...';

                const result = await login(email, password);

                if (result.success) {
                    const isAdmin = (result.user?.email || '').toLowerCase() === 'narhsnazzisco@gmail.com'.toLowerCase();
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    const safeRedirect = isValidRedirect(redirect) ? redirect : null;
                    window.location.href = isAdmin ? 'admin/dashboard.html' : (safeRedirect || 'index.html');
                } else {
                    errorMsg.textContent = result.error;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
            });

            googleBtn.addEventListener('click', async () => {
                const googleErrorMsg = document.getElementById('google-error-message');
                googleErrorMsg.style.display = 'none';
                googleBtn.disabled = true;
                googleBtn.textContent = 'Connecting...';

                const result = await loginGoogle();

                if (result.success) {
                    const isAdmin = (result.user?.email || '').toLowerCase() === 'narhsnazzisco@gmail.com'.toLowerCase();
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    const safeRedirect = isValidRedirect(redirect) ? redirect : null;
                    window.location.href = isAdmin ? 'admin/dashboard.html' : (safeRedirect || 'index.html');
                    return; // Stop execution — page is navigating away
                }

                // Show persistent error message on failure
                googleErrorMsg.textContent = result.error || 'Google sign-in failed. Please try again.';
                googleErrorMsg.style.display = 'block';

                googleBtn.disabled = false;
                const googleSvg = `<svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>`;
                googleBtn.innerHTML = `${googleSvg} Continue with Google`;
            });
        });
    </script>
    <script src="js/whatsapp.js"></script>
    <script type="module">
        import { initAIWidget } from './js/ai-widget.js';
        import { initNavMenu } from './js/nav-menu.js';
        initAIWidget();
        initNavMenu();
    </script>
</body>
</html>
